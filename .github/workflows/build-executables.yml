name: Build Rust Executables

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.4.2, v2.0, etc.
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

env:
  # CHANGE THIS to the exact name of your binary as defined in Cargo.toml
  CRATE_NAME: eve-log-scripts 
  # CHANGE THIS to your desired final output artifact name
  OUTPUT_NAME: eve-log-scripts

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            os_suffix: Windows
            extension: .exe
          - os: ubuntu-latest
            os_suffix: Linux
            extension: ''
          - os: macos-latest
            os_suffix: macOS
            extension: ''

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag or use commit hash
      id: version
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=$(git rev-parse --short HEAD)
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@nightly

    - name: Install ALSA dependencies (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config

    - name: Build Release
      env:
        # This makes the VERSION environment variable available to rustc during compilation
        VERSION: ${{ steps.version.outputs.version }}
      run: cargo build --release

    - name: Rename executable (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p dist
        mv "target/release/${{ env.CRATE_NAME }}${{ matrix.extension }}" "dist/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.os_suffix }}${{ matrix.extension }}"

    - name: Rename executable (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p dist
        mv "target/release/${{ env.CRATE_NAME }}" "dist/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.os_suffix }}${{ matrix.extension }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.os_suffix }}
        path: dist/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.os_suffix }}${{ matrix.extension }}
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-Windows/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-Windows.exe
          artifacts/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-Linux/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-Linux
          artifacts/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-macOS/${{ env.OUTPUT_NAME }}-${{ steps.version.outputs.version }}-macOS
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}